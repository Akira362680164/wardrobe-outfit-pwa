import groovy.json.JsonSlurper
import java.util.Properties

apply plugin: 'com.android.application'

def readAppVersionName() {
    def packageJsonFile = new File(rootProject.projectDir, "../package.json")
    if (!packageJsonFile.exists()) {
        return "1.0.0"
    }

    return new JsonSlurper().parse(packageJsonFile).version as String
}

def toAndroidVersionCode(String versionName) {
    def matcher = versionName =~ /^(\d+)\.(\d+)\.(\d+)/
    if (!matcher.find()) {
        return 1
    }

    def major = matcher.group(1) as int
    def minor = matcher.group(2) as int
    def patch = matcher.group(3) as int
    return Math.max(1, major * 10000 + minor * 100 + patch)
}

def appVersionName = readAppVersionName()
def appVersionCode = toAndroidVersionCode(appVersionName)
def fixedSigningPropertiesFile = rootProject.file("signing/wardrobe-signing.properties")
def fixedSigningProperties = new Properties()
if (!fixedSigningPropertiesFile.exists()) {
    throw new GradleException("固定 APK 签名配置缺失：android/signing/wardrobe-signing.properties。不要改用默认 debug keystore。")
}
fixedSigningPropertiesFile.withInputStream { fixedSigningProperties.load(it) }
def fixedSigningStoreFile = rootProject.file(fixedSigningProperties["storeFile"] as String)
if (!fixedSigningStoreFile.exists()) {
    throw new GradleException("固定 APK 签名 key 缺失：android/${fixedSigningProperties["storeFile"]}。不要重新生成或改用其他 key。")
}

android {
    namespace = "com.wardrobe.outfit"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        wardrobeFixed {
            storeFile fixedSigningStoreFile
            storePassword fixedSigningProperties["storePassword"] as String
            keyAlias fixedSigningProperties["keyAlias"] as String
            keyPassword fixedSigningProperties["keyPassword"] as String
        }
    }
    defaultConfig {
        applicationId "com.wardrobe.outfit"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.wardrobeFixed
        }
        release {
            signingConfig signingConfigs.wardrobeFixed
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
